# Local development infrastructure for Folio.
#
# Currently provides RabbitMQ (with the management UI) so the backend
# and the email-service can talk to each other. Run with:
#
#   docker compose -f docker-compose.dev.yml up -d
#
# A production compose file is intentionally NOT included yet; that
# lives with the deployment story (see docs/plans/email-service.md).

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: folio-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - folio-rabbitmq-data:/var/lib/rabbitmq

volumes:
  folio-rabbitmq-data:
